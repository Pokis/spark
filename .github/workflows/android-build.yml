name: Android EAS build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS profile
        required: true
        default: preview
        type: choice
        options: [preview, production]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx eas-cli build --platform android --profile "${{ inputs.profile }}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
