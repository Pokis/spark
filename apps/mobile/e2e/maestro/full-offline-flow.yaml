appId: com.djpokis.sparkhabits.app
name: Spark minimal offline habit flow
---
- launchApp:
    clearState: true

# Minimal onboarding
- assertVisible:
    id: onboarding-continue
- assertVisible: "A habit list and calendar."
- tapOn:
    id: onboarding-continue
- assertVisible: "How often?"
- tapOn:
    id: onboarding-first-habit
- inputText: "Take vitamins"
- hideKeyboard
- tapOn: "After I complete it"
- tapOn:
    id: onboarding-continue
- assertVisible:
    id: today-screen

# One-tap yes-or-no completion and Calendar review
- assertVisible: "Take vitamins"
- tapOn: "Done"
- assertVisible: "Take vitamins completed"
- tapOn: "Calendar"
- assertVisible: "Month"
- assertVisible: "Record"
- tapOn: "Record"
- assertVisible: "Total completions"
- assertVisible: "1"

# Verify that the local SQLCipher-backed state survives a process restart
- stopApp
- launchApp
- tapOn: "Calendar"
- tapOn: "Record"
- assertVisible: "Take vitamins"
- assertVisible: "1"
